<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNAPIRRO HTML Presentation</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #101d36; overflow: hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .stage { position: fixed; inset: 0; display: grid; place-items: center; }
    .slide { max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh; object-fit: contain; display: none; background: #f7f6f2; }
    .slide.active { display: block; }
    .counter { position: fixed; right: 24px; bottom: 18px; color: rgba(255,255,255,.78); background: rgba(0,0,0,.35); padding: 6px 12px; border-radius: 999px; font-size: 14px; }
    .hint { position: fixed; left: 24px; bottom: 18px; color: rgba(255,255,255,.58); font-size: 13px; }
  </style>
</head>
<body>
  <main class="stage" id="stage"></main>
  <div class="hint">← / → 翻页，F 全屏</div>
  <div class="counter" id="counter"></div>
  <script>
    const slides = [
      "slide-01.png",
      "slide-02.png",
      "slide-03.png",
      "slide-04.png",
      "slide-05.png",
      "slide-06.png",
      "slide-07.png",
      "slide-08.png",
      "slide-09.png",
      "slide-10.png",
      "slide-11.png",
      "slide-12.png",
      "slide-13.png",
      "slide-14.png",
      "slide-15.png",
      "slide-16.png",
      "slide-17.png",
      "slide-18.png",
      "slide-19.png"
    ];
    const stage = document.getElementById('stage');
    const counter = document.getElementById('counter');
    let current = 0;
    slides.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'slide';
      img.src = src;
      img.alt = `Slide ${String(i + 1).padStart(2, '0')}`;
      stage.appendChild(img);
    });
    const imgs = [...document.querySelectorAll('.slide')];
    function show(i) {
      current = Math.max(0, Math.min(slides.length - 1, i));
      imgs.forEach((img, idx) => img.classList.toggle('active', idx === current));
      counter.textContent = `${current + 1} / ${slides.length}`;
    }
    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }
    document.addEventListener('keydown', e => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) show(current + 1);
      if (['ArrowLeft', 'PageUp'].includes(e.key)) show(current - 1);
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
    });
    document.addEventListener('click', () => show(current + 1));
    show(0);
  </script>
</body>
</html>
