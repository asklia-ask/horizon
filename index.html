<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNAPIRRO HTML Presentation</title>
  <style>
    :root {
      --bg: #101d36;
      --panel: rgba(8, 16, 32, .42);
      --text: rgba(255, 255, 255, .86);
      --muted: rgba(255, 255, 255, .58);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 35%, #1b2d52 0%, var(--bg) 45%, #081225 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #101d36;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      background: #101d36;
    }

    .slide img {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      background: #f7f6f2;
      transform: scale(1.006);
      filter: blur(2px) brightness(.98) contrast(1.02);
      will-change: opacity, transform, filter;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
    }

    .slide.active img {
      animation: dissolveIn 420ms cubic-bezier(.2, .72, .24, 1) both;
    }

    .slide.exit-left,
    .slide.exit-right {
      opacity: 1;
      z-index: 2;
    }

    .slide.exit-left img,
    .slide.exit-right img {
      animation: dissolveOut 260ms ease-out both;
    }

    /* 溶解颗粒层：快速闪现，避免蚀刻扫光的拖沓感 */
    .slide.active::before,
    .slide.exit-left::before,
    .slide.exit-right::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.30) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 72%, rgba(255,255,255,.22) 0 1px, transparent 2px),
        radial-gradient(circle at 46% 36%, rgba(255,255,255,.26) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 84% 24%, rgba(255,255,255,.22) 0 1px, transparent 2px),
        repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.10) 0 1px, transparent 2px 7px);
      background-size: 90px 90px, 120px 120px, 140px 140px, 100px 100px, 160px 160px, 18px 18px;
      mix-blend-mode: screen;
      opacity: 0;
    }

    .slide.active::before {
      animation: dissolveGrainIn 420ms ease-out both;
    }

    .slide.exit-left::before,
    .slide.exit-right::before {
      animation: dissolveGrainOut 260ms ease-out both;
    }

    @keyframes dissolveIn {
      0% {
        opacity: 0;
        transform: scale(1.014);
        filter: blur(7px) brightness(1.08) contrast(1.12) saturate(.9);
      }
      45% {
        opacity: .72;
        filter: blur(3px) brightness(1.04) contrast(1.06) saturate(.95);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) brightness(1) contrast(1) saturate(1);
      }
    }

    @keyframes dissolveOut {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) brightness(1) contrast(1);
      }
      100% {
        opacity: 0;
        transform: scale(.998);
        filter: blur(4px) brightness(.9) contrast(1.08) saturate(.88);
      }
    }

    @keyframes dissolveGrainIn {
      0% { opacity: .72; transform: scale(1.04); }
      55% { opacity: .36; }
      100% { opacity: 0; transform: scale(1); }
    }

    @keyframes dissolveGrainOut {
      0% { opacity: 0; transform: scale(1); }
      40% { opacity: .42; }
      100% { opacity: 0; transform: scale(1.025); }
    }

    .topbar {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, .12);
      z-index: 10;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #20a4ad, #d7ad54, #f05aa7);
      transition: width 260ms ease;
    }

    .counter,
    .hint {
      position: fixed;
      z-index: 10;
      color: var(--text);
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .18);
      user-select: none;
    }

    .counter {
      right: 24px;
      bottom: 20px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: .02em;
    }

    .hint {
      left: 24px;
      bottom: 20px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
    }

    .click-zone {
      position: fixed;
      inset: 0;
      z-index: 9;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .hint { display: none; }
      .counter { right: 14px; bottom: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .slide img,
      .slide::before,
      .progress {
        animation: none !important;
        transition: none !important;
        filter: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-label="SNAPIRRO HTML 演示文稿"></main>
  <div class="click-zone" id="clickZone" title="点击进入下一页"></div>
  <div class="topbar"><div class="progress" id="progress"></div></div>
  <div class="hint">点击 / ← / → 翻页，F 全屏</div>
  <div class="counter" id="counter"></div>

  <script>
    const slides = [
      "slide-01.png",
      "slide-02.png",
      "slide-03.png",
      "slide-04.png",
      "slide-05.png",
      "slide-06.png",
      "slide-07.png",
      "slide-08.png",
      "slide-09.png",
      "slide-10.png",
      "slide-11.png",
      "slide-12.png",
      "slide-13.png",
      "slide-14.png",
      "slide-15.png",
      "slide-16.png",
      "slide-17.png",
      "slide-18.png",
      "slide-19.png"
    ];

    const stage = document.getElementById('stage');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const clickZone = document.getElementById('clickZone');
    let current = 0;
    let last = 0;
    let startX = null;

    slides.forEach((src, i) => {
      const slide = document.createElement('section');
      slide.className = 'slide';

      const img = document.createElement('img');
      img.src = src;
      img.alt = `Slide ${String(i + 1).padStart(2, '0')}`;
      img.loading = i === 0 ? 'eager' : 'lazy';

      slide.appendChild(img);
      stage.appendChild(slide);
    });

    const slideEls = [...document.querySelectorAll('.slide')];

    function show(index) {
      const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
      if (nextIndex === current && slideEls[current].classList.contains('active')) return;

      last = current;
      current = nextIndex;
      const movingForward = current >= last;

      slideEls.forEach((slide, idx) => {
        slide.classList.remove('active', 'exit-left', 'exit-right');
        if (idx === current) {
          slide.classList.add('active');
        } else if (idx === last) {
          slide.classList.add(movingForward ? 'exit-left' : 'exit-right');
        }
      });

      counter.textContent = `${current + 1} / ${slides.length}`;
      progress.style.width = `${((current + 1) / slides.length) * 100}%`;
    }

    function next() { show(current + 1); }
    function prev() { show(current - 1); }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    document.addEventListener('keydown', e => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) next();
      if (['ArrowLeft', 'PageUp'].includes(e.key)) prev();
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(slides.length - 1);
    });

    clickZone.addEventListener('click', next);

    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const delta = endX - startX;
      if (Math.abs(delta) > 48) delta < 0 ? next() : prev();
      startX = null;
    }, { passive: true });

    // 预加载前几张图片，让现场演示翻页更顺滑
    slides.slice(1, 5).forEach(src => {
      const preload = new Image();
      preload.src = src;
    });

    show(0);
  </script>
</body>
</html>
