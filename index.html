<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNAPIRRO HTML Presentation</title>
  <style>
    :root {
      --bg: #101d36;
      --panel: rgba(8, 16, 32, .42);
      --text: rgba(255, 255, 255, .86);
      --muted: rgba(255, 255, 255, .58);
      --accent: #20a4ad;
      --gold: #d7ad54;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, #1b2d52 0%, var(--bg) 45%, #081225 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      perspective: 1400px;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      background: #101d36;
    }

    .slide img {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      background: #f7f6f2;
      transform: scale(1.015);
      filter: saturate(.88) contrast(1.08) brightness(.92);
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
    }

    .slide.active img {
      animation: etchedReveal 960ms cubic-bezier(.2, .72, .2, 1) both;
    }

    .slide.exit-left,
    .slide.exit-right {
      opacity: 1;
      z-index: 2;
    }

    .slide.exit-left img,
    .slide.exit-right img {
      animation: etchedFade 720ms cubic-bezier(.4, 0, .2, 1) both;
    }

    .slide.active::before,
    .slide.active::after {
      content: "";
      position: absolute;
      inset: -12%;
      z-index: 4;
      pointer-events: none;
    }

    /* 蚀刻纹理：斜向细线 + 颗粒感，像被光刻出来的渐变遮罩 */
    .slide.active::before {
      background:
        repeating-linear-gradient(115deg,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 6px,
          rgba(255,255,255,.28) 7px,
          rgba(255,255,255,0) 10px),
        repeating-linear-gradient(25deg,
          rgba(215,173,84,0) 0px,
          rgba(215,173,84,0) 12px,
          rgba(215,173,84,.16) 13px,
          rgba(215,173,84,0) 16px);
      mix-blend-mode: screen;
      opacity: 0;
      transform: translateX(-36%) skewX(-8deg);
      animation: etchLines 980ms ease-out both;
    }

    /* 渐变光刃：从左到右扫过，制造“蚀刻渐变”入场 */
    .slide.active::after {
      background: linear-gradient(108deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0) 35%,
        rgba(255,255,255,.74) 47%,
        rgba(215,173,84,.34) 52%,
        rgba(32,164,173,.22) 58%,
        rgba(255,255,255,0) 70%,
        rgba(255,255,255,0) 100%);
      mix-blend-mode: screen;
      opacity: 0;
      transform: translateX(-58%) skewX(-10deg);
      animation: etchSweep 980ms cubic-bezier(.16, .84, .36, 1) both;
    }

    @keyframes etchedReveal {
      0% {
        opacity: 0;
        transform: scale(1.035) translateX(1.8vw);
        filter: blur(10px) saturate(.45) contrast(1.36) brightness(1.18);
        clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
      }
      24% {
        opacity: .58;
        clip-path: polygon(0 0, 36% 0, 29% 100%, 0 100%);
      }
      58% {
        opacity: 1;
        clip-path: polygon(0 0, 82% 0, 74% 100%, 0 100%);
        filter: blur(2px) saturate(.8) contrast(1.16) brightness(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateX(0);
        filter: blur(0) saturate(1) contrast(1) brightness(1);
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      }
    }

    @keyframes etchedFade {
      0% {
        opacity: 1;
        transform: scale(1) translateX(0);
        filter: blur(0) saturate(1) contrast(1) brightness(1);
      }
      100% {
        opacity: 0;
        transform: scale(.992) translateX(-1.2vw);
        filter: blur(8px) saturate(.6) contrast(1.22) brightness(.78);
      }
    }

    @keyframes etchLines {
      0% { opacity: 0; transform: translateX(-42%) skewX(-8deg); }
      18% { opacity: .88; }
      62% { opacity: .45; }
      100% { opacity: 0; transform: translateX(42%) skewX(-8deg); }
    }

    @keyframes etchSweep {
      0% { opacity: 0; transform: translateX(-64%) skewX(-10deg); }
      20% { opacity: .9; }
      64% { opacity: .62; }
      100% { opacity: 0; transform: translateX(64%) skewX(-10deg); }
    }

    .topbar {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, .12);
      z-index: 10;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #20a4ad, #d7ad54, #f05aa7);
      transition: width 420ms ease;
    }

    .counter,
    .hint {
      position: fixed;
      z-index: 10;
      color: var(--text);
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .18);
      user-select: none;
    }

    .counter {
      right: 24px;
      bottom: 20px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: .02em;
    }

    .hint {
      left: 24px;
      bottom: 20px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
    }

    .click-zone {
      position: fixed;
      inset: 0;
      z-index: 9;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .hint { display: none; }
      .counter { right: 14px; bottom: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .slide img,
      .slide::before,
      .slide::after,
      .progress {
        animation: none !important;
        transition: none !important;
        filter: none !important;
        clip-path: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-label="SNAPIRRO HTML 演示文稿"></main>
  <div class="click-zone" id="clickZone" title="点击进入下一页"></div>
  <div class="topbar"><div class="progress" id="progress"></div></div>
  <div class="hint">点击 / ← / → 翻页，F 全屏</div>
  <div class="counter" id="counter"></div>

  <script>
    const slides = [
      "slide-01.png",
      "slide-02.png",
      "slide-03.png",
      "slide-04.png",
      "slide-05.png",
      "slide-06.png",
      "slide-07.png",
      "slide-08.png",
      "slide-09.png",
      "slide-10.png",
      "slide-11.png",
      "slide-12.png",
      "slide-13.png",
      "slide-14.png",
      "slide-15.png",
      "slide-16.png",
      "slide-17.png",
      "slide-18.png",
      "slide-19.png"
    ];

    const stage = document.getElementById('stage');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const clickZone = document.getElementById('clickZone');
    let current = 0;
    let last = 0;
    let startX = null;

    slides.forEach((src, i) => {
      const slide = document.createElement('section');
      slide.className = 'slide';

      const img = document.createElement('img');
      img.src = src;
      img.alt = `Slide ${String(i + 1).padStart(2, '0')}`;
      img.loading = i === 0 ? 'eager' : 'lazy';

      slide.appendChild(img);
      stage.appendChild(slide);
    });

    const slideEls = [...document.querySelectorAll('.slide')];

    function show(index) {
      const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
      if (nextIndex === current && slideEls[current].classList.contains('active')) return;

      last = current;
      current = nextIndex;
      const movingForward = current >= last;

      slideEls.forEach((slide, idx) => {
        slide.classList.remove('active', 'exit-left', 'exit-right');
        if (idx === current) {
          slide.classList.add('active');
        } else if (idx === last) {
          slide.classList.add(movingForward ? 'exit-left' : 'exit-right');
        }
      });

      counter.textContent = `${current + 1} / ${slides.length}`;
      progress.style.width = `${((current + 1) / slides.length) * 100}%`;
    }

    function next() { show(current + 1); }
    function prev() { show(current - 1); }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    document.addEventListener('keydown', e => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) next();
      if (['ArrowLeft', 'PageUp'].includes(e.key)) prev();
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(slides.length - 1);
    });

    clickZone.addEventListener('click', next);

    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const delta = endX - startX;
      if (Math.abs(delta) > 48) delta < 0 ? next() : prev();
      startX = null;
    }, { passive: true });

    // 预加载前几张图片，让现场演示翻页更顺滑
    slides.slice(1, 5).forEach(src => {
      const preload = new Image();
      preload.src = src;
    });

    show(0);
  </script>
</body>
</html>
