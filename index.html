<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNAPIRRO HTML Presentation</title>
  <style>
    :root {
      --bg: #101d36;
      --panel: rgba(8, 16, 32, .48);
      --panel-strong: rgba(8, 16, 32, .72);
      --text: rgba(255, 255, 255, .88);
      --muted: rgba(255, 255, 255, .58);
      --sidebar-width: 174px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 35%, #1b2d52 0%, var(--bg) 45%, #081225 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .thumbs {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-width);
      z-index: 20;
      padding: 14px 10px 18px;
      overflow-y: auto;
      background: linear-gradient(180deg, rgba(4, 10, 22, .88), rgba(10, 20, 40, .78));
      border-right: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 14px 0 34px rgba(0, 0, 0, .22);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .thumbs-title {
      position: sticky;
      top: -14px;
      z-index: 2;
      margin: -14px -10px 10px;
      padding: 14px 12px 10px;
      color: var(--text);
      font-size: 13px;
      letter-spacing: .04em;
      background: rgba(4, 10, 22, .72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .thumb {
      width: 100%;
      padding: 0;
      margin: 0 0 10px;
      display: block;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, .16);
      border-radius: 12px;
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      opacity: .72;
      transition: transform 180ms ease, opacity 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .thumb:hover {
      transform: translateY(-1px);
      opacity: .96;
      border-color: rgba(255, 255, 255, .42);
    }

    .thumb.active {
      opacity: 1;
      border-color: #20a4ad;
      box-shadow: 0 0 0 2px rgba(32, 164, 173, .25), 0 12px 24px rgba(0, 0, 0, .26);
    }

    .thumb img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #f7f6f2;
    }

    .thumb-number {
      position: absolute;
      left: 6px;
      top: 6px;
      min-width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: rgba(0, 0, 0, .56);
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
    }

    .stage {
      position: fixed;
      left: var(--sidebar-width);
      right: 0;
      top: 0;
      bottom: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #101d36;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      background: #101d36;
    }

    .slide img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #f7f6f2;
      transform: scale(1.006);
      filter: blur(2px) brightness(.98) contrast(1.02);
      will-change: opacity, transform, filter;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
    }

    .slide.active img {
      animation: dissolveIn 360ms cubic-bezier(.2, .72, .24, 1) both;
    }

    .slide.exit-left,
    .slide.exit-right {
      opacity: 1;
      z-index: 2;
    }

    .slide.exit-left img,
    .slide.exit-right img {
      animation: dissolveOut 220ms ease-out both;
    }

    .slide.active::before,
    .slide.exit-left::before,
    .slide.exit-right::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.28) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 72%, rgba(255,255,255,.20) 0 1px, transparent 2px),
        radial-gradient(circle at 46% 36%, rgba(255,255,255,.24) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 84% 24%, rgba(255,255,255,.20) 0 1px, transparent 2px),
        repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.09) 0 1px, transparent 2px 7px);
      background-size: 90px 90px, 120px 120px, 140px 140px, 100px 100px, 160px 160px, 18px 18px;
      mix-blend-mode: screen;
      opacity: 0;
    }

    .slide.active::before {
      animation: dissolveGrainIn 360ms ease-out both;
    }

    .slide.exit-left::before,
    .slide.exit-right::before {
      animation: dissolveGrainOut 220ms ease-out both;
    }

    @keyframes dissolveIn {
      0% {
        opacity: 0;
        transform: scale(1.012);
        filter: blur(6px) brightness(1.06) contrast(1.10) saturate(.92);
      }
      46% {
        opacity: .74;
        filter: blur(2px) brightness(1.03) contrast(1.04) saturate(.96);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) brightness(1) contrast(1) saturate(1);
      }
    }

    @keyframes dissolveOut {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) brightness(1) contrast(1);
      }
      100% {
        opacity: 0;
        transform: scale(.998);
        filter: blur(4px) brightness(.9) contrast(1.08) saturate(.88);
      }
    }

    @keyframes dissolveGrainIn {
      0% { opacity: .64; transform: scale(1.035); }
      55% { opacity: .28; }
      100% { opacity: 0; transform: scale(1); }
    }

    @keyframes dissolveGrainOut {
      0% { opacity: 0; transform: scale(1); }
      40% { opacity: .36; }
      100% { opacity: 0; transform: scale(1.02); }
    }

    .topbar {
      position: fixed;
      left: var(--sidebar-width);
      top: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, .12);
      z-index: 10;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #20a4ad, #d7ad54, #f05aa7);
      transition: width 240ms ease;
    }

    .counter,
    .hint {
      position: fixed;
      z-index: 10;
      color: var(--text);
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .18);
      user-select: none;
    }

    .counter {
      right: 24px;
      bottom: 20px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: .02em;
    }

    .hint {
      left: calc(var(--sidebar-width) + 24px);
      bottom: 20px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
    }

    .click-zone {
      position: fixed;
      left: var(--sidebar-width);
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 9;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      :root { --sidebar-width: 0px; }

      .thumbs {
        top: auto;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100px;
        padding: 10px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-top: 1px solid rgba(255, 255, 255, .12);
      }

      .thumbs-title { display: none; }

      .thumb {
        flex: 0 0 120px;
        margin: 0;
      }

      .stage { bottom: 100px; }
      .click-zone { bottom: 100px; }
      .hint { display: none; }
      .counter { right: 14px; bottom: 112px; }
      .topbar { left: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .slide img,
      .slide::before,
      .progress,
      .thumb {
        animation: none !important;
        transition: none !important;
        filter: none !important;
      }
    }
  </style>
</head>
<body>
  <aside class="thumbs" id="thumbs" aria-label="幻灯片缩略图导航">
    <div class="thumbs-title">Slides</div>
  </aside>

  <main class="stage" id="stage" aria-label="SNAPIRRO HTML 演示文稿"></main>
  <div class="click-zone" id="clickZone" title="点击进入下一页"></div>
  <div class="topbar"><div class="progress" id="progress"></div></div>
  <div class="hint">点击 / ← / → 翻页，点击左侧缩略图跳转，F 全屏</div>
  <div class="counter" id="counter"></div>

  <script>
    const slides = [
      "slide-01.png",
      "slide-02.png",
      "slide-03.png",
      "slide-04.png",
      "slide-05.png",
      "slide-06.png",
      "slide-07.png",
      "slide-08.png",
      "slide-09.png",
      "slide-10.png",
      "slide-11.png",
      "slide-12.png",
      "slide-13.png",
      "slide-14.png",
      "slide-15.png",
      "slide-16.png",
      "slide-17.png",
      "slide-18.png",
      "slide-19.png"
    ];

    const stage = document.getElementById('stage');
    const thumbs = document.getElementById('thumbs');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const clickZone = document.getElementById('clickZone');
    let current = 0;
    let last = 0;
    let startX = null;

    slides.forEach((src, i) => {
      const slide = document.createElement('section');
      slide.className = 'slide';

      const img = document.createElement('img');
      img.src = src;
      img.alt = `Slide ${String(i + 1).padStart(2, '0')}`;
      img.loading = i === 0 ? 'eager' : 'lazy';

      slide.appendChild(img);
      stage.appendChild(slide);

      const thumb = document.createElement('button');
      thumb.className = 'thumb';
      thumb.type = 'button';
      thumb.setAttribute('aria-label', `跳转到第 ${i + 1} 页`);
      thumb.innerHTML = `<img src="${src}" alt="第 ${i + 1} 页缩略图" loading="lazy"><span class="thumb-number">${i + 1}</span>`;
      thumb.addEventListener('click', event => {
        event.stopPropagation();
        show(i);
      });
      thumbs.appendChild(thumb);
    });

    const slideEls = [...document.querySelectorAll('.slide')];
    const thumbEls = [...document.querySelectorAll('.thumb')];

    function show(index) {
      const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
      if (nextIndex === current && slideEls[current].classList.contains('active')) return;

      last = current;
      current = nextIndex;
      const movingForward = current >= last;

      slideEls.forEach((slide, idx) => {
        slide.classList.remove('active', 'exit-left', 'exit-right');
        if (idx === current) {
          slide.classList.add('active');
        } else if (idx === last) {
          slide.classList.add(movingForward ? 'exit-left' : 'exit-right');
        }
      });

      thumbEls.forEach((thumb, idx) => {
        const isActive = idx === current;
        thumb.classList.toggle('active', isActive);
        thumb.setAttribute('aria-current', isActive ? 'true' : 'false');
      });

      thumbEls[current]?.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
      counter.textContent = `${current + 1} / ${slides.length}`;
      progress.style.width = `${((current + 1) / slides.length) * 100}%`;
    }

    function next() { show(current + 1); }
    function prev() { show(current - 1); }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    document.addEventListener('keydown', e => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) next();
      if (['ArrowLeft', 'PageUp'].includes(e.key)) prev();
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(slides.length - 1);
    });

    clickZone.addEventListener('click', next);

    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const delta = endX - startX;
      if (Math.abs(delta) > 48) delta < 0 ? next() : prev();
      startX = null;
    }, { passive: true });

    slides.slice(1, 5).forEach(src => {
      const preload = new Image();
      preload.src = src;
    });

    show(0);
  </script>
</body>
</html>
